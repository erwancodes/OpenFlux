name: Fetch RSS Feeds

on:
  schedule:
    # 6h du matin heure de Paris (5h UTC en hiver, 4h UTC en été)
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-rss-feeds
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds
        run: node --experimental-strip-types scripts/fetch-feeds.ts

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git status --short
          if git diff --staged --quiet; then
            echo "No new articles found."
          else
            git commit -m "📡 Mise à jour des flux RSS — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi
